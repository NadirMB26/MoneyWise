<ion-header>
  <ion-toolbar>
    <ion-title>Transacciones</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

<ion-list>

<ion-item *ngFor="let t of transacciones">

  <ion-label>

    <h2>{{t.getCategoria()}}</h2>

    <p>{{t.getFecha() | date:'shortDate'}}</p>

  </ion-label>

  <ion-badge
    [color]="t.getTipo() === 'ingreso' ? 'success' : 'danger'">

    {{t.getMonto()}}

  </ion-badge>

</ion-item>

</ion-list>

</ion-content>
