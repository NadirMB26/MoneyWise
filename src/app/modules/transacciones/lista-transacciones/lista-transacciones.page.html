<app-header></app-header>

<ion-content>

<div class="fondo-fintech">

<div class="dashboard-container">

<!-- FILTROS -->

<app-filter-bar
(onTipoChange)="tipoFiltro = $event"
(onCategoriaChange)="categoriaFiltro = $event"
(onBuscarChange)="textoBusqueda = $event">
</app-filter-bar>


<!-- SKELETON LOADING -->

<ion-list *ngIf="loading" class="lista-transacciones">

  <ion-item *ngFor="let i of [1,2,3,4]">

    <ion-label>

      <h2>
        <ion-skeleton-text animated style="width:60%"></ion-skeleton-text>
      </h2>

      <p>
        <ion-skeleton-text animated style="width:40%"></ion-skeleton-text>
      </p>

    </ion-label>

  </ion-item>

</ion-list>


<!-- ESTADO VACIO -->

<div *ngIf="!loading && transacciones.length === 0" class="empty-state">

  <ion-icon name="wallet-outline"></ion-icon>

  <h3>No tienes transacciones</h3>

  <p>Agrega tu primera transacción</p>

</div>


<!-- LISTA DE TRANSACCIONES -->

<ion-list
class="lista-transacciones"
*ngIf="!loading && transacciones.length > 0">

<ion-item-sliding
*ngFor="let t of (
  transacciones
  | filterByType:tipoFiltro
  | filterByCategory:categoriaFiltro
  | searchByText:textoBusqueda
)">

<!-- EDITAR -->

<ion-item-options side="start">

<ion-item-option
color="warning"
(click)="$event.stopPropagation(); editarTransaccion(t)">

<ion-icon slot="icon-only" name="create-outline"></ion-icon>

</ion-item-option>

</ion-item-options>


<!-- ITEM -->

<ion-item (click)="verDetalle(t)" class="item-transaccion">

<ion-label>

<h2>{{t.getCategoria()}}</h2>

<p>{{t.getDescripcion()}}</p>

<p>{{t.getFecha() | date:'shortDate'}}</p>

</ion-label>

<ion-badge
slot="end"
[color]="t.getTipo() === 'ingreso' ? 'success' : 'danger'">

{{t.getMonto() | currency}}

</ion-badge>

<ion-icon
*ngIf="t.getComprobante()"
name="camera-outline"
slot="end"
color="primary">
</ion-icon>

</ion-item>


<!-- ELIMINAR -->

<ion-item-options side="end">

<ion-item-option
color="danger"
(click)="eliminarTransaccion(t)">

<ion-icon slot="icon-only" name="trash-outline"></ion-icon>

</ion-item-option>

</ion-item-options>

</ion-item-sliding>

</ion-list>

</div>

</div>

</ion-content>
