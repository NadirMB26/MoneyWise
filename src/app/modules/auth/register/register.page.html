

<ion-content>
  <ion-item>
  <ion-input
    placeholder="Nombre"
    [(ngModel)]="nombre">
  </ion-input>
</ion-item>

<ion-item>
  <ion-input
    placeholder="Email"
    [(ngModel)]="email">
  </ion-input>
</ion-item>

<ion-item>
  <ion-input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password">
  </ion-input>
</ion-item>

<ion-button expand="full" (click)="register()">
  Registrarse
</ion-button>
</ion-content>
