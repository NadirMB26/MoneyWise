<ion-header>
  <ion-toolbar class="app-header">

    <ion-title class="main-title">
      <span class="app-name">MoneyWise</span>
      <span class="page-name"> - Registro</span>
    </ion-title>

  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">

<div class="login-container">

  <ion-card>

    <ion-card-header class="ion-text-center">
      <ion-card-title>Crear Cuenta</ion-card-title>
      <ion-card-subtitle>Empieza a gestionar tu dinero</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-input
          label="Nombre"
          labelPlacement="floating"
          [(ngModel)]="nombre">
        </ion-input>
      </ion-item>

      <ion-item>
        <ion-input
          type="email"
          label="Email"
          labelPlacement="floating"
          [(ngModel)]="email"
          name="email"
          required
          email>
        </ion-input>
      </ion-item>
      <ion-item>
        <ion-input
          type="password"
          label="Contraseña"
          labelPlacement="floating"
          [(ngModel)]="password">
        </ion-input>
      </ion-item>

      <ion-button id="open-loading" expand="block" class="ion-margin-top" (click)="register()">
        Crear cuenta
      </ion-button>

      <div class="register-link">
        <ion-text color="dark">
          ¿Ya tienes cuenta?
        </ion-text>

        <ion-button id="open-loading"
          fill="clear"
          routerLink="/auth/login"
          class="btn-login">
          Inicia sesión
        </ion-button>
        <ion-loading class="custom-loading" trigger="open-loading" message="Loading..." [duration]="250"></ion-loading>

      </div>

    </ion-card-content>

  </ion-card>

</div>

</ion-content>
