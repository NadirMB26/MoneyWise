<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

<ion-item>
  <ion-input
    placeholder="Email"
    [(ngModel)]="email">
  </ion-input>
</ion-item>

<ion-item>
  <ion-input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password">
  </ion-input>
</ion-item>

<ion-button expand="full" (click)="login()">
  Iniciar sesión
</ion-button>

<ion-text color="danger" *ngIf="error">
  {{ error }}
</ion-text>

</ion-content>
